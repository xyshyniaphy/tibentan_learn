{% extends "base.html" %}

{% block title %}创建教程 - 藏语学习{% endblock %}

{% block content %}
<div class="card">
    <h1>📝 创建新教程</h1>
    <p style="color: #666; margin-bottom: 30px;">在下方粘贴藏语文本，系统将生成逐词翻译教程。</p>

    <form id="createForm">
        <div style="margin-bottom: 20px;">
            <label for="text" style="display: block; margin-bottom: 10px; font-weight: bold; color: #8B0000;">
                藏语文本：
            </label>
            <textarea
                id="text"
                name="text"
                rows="10"
                style="width: 100%; padding: 15px; border: 2px solid #DAA520; border-radius: 10px; font-size: 1.2em; font-family: 'Noto Serif Tibetan', 'Microsoft Himalaya', serif; resize: vertical;"
                placeholder="བཀྲ་ཤིས་བདེ་ལེགས་ཞུ་བ་ཡིན།"
                required
            ></textarea>
        </div>

        <div style="display: flex; gap: 15px;">
            <button type="submit" class="btn btn-primary" id="submitBtn">
                🚀 生成教程
            </button>
            <a href="/" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>

<div class="card">
    <h3>💡 示例文本</h3>
    <p style="color: #666; margin-bottom: 15px;">点击使用此示例藏语文本：</p>
    <code
        style="display: block; padding: 15px; background: #F5F5F5; border-radius: 8px; cursor: pointer; font-size: 1.1em;"
        onclick="document.getElementById('text').value = this.textContent;"
    >
        བཀྲ་ཤིས་བདེ་ལེགས་ཞུ་བ་ཡིན། ཐུགས་རྗེ་ཆེ།
    </code>
    <p style="color: #999; margin-top: 10px; font-size: 0.9em;">
        （扎西德勒，谢谢）
    </p>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('createForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const btn = document.getElementById('submitBtn');
    const text = document.getElementById('text').value;

    btn.textContent = '⏳ 处理中...';
    btn.disabled = true;

    try {
        const response = await fetch('/api/generate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ text: text })
        });

        const data = await response.json();

        if (data.redirect) {
            window.location.href = data.redirect;
        } else {
            alert('错误：' + (data.detail || '未知错误'));
            btn.textContent = '🚀 生成教程';
            btn.disabled = false;
        }
    } catch (error) {
        alert('错误：' + error.message);
        btn.textContent = '🚀 生成教程';
        btn.disabled = false;
    }
});
</script>
{% endblock %}
