<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}藏语学习{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FDF5E6 0%, #FAF0E6 100%);
            min-height: 100vh;
            color: #333;
        }

        nav {
            background: linear-gradient(135deg, #8B0000 0%, #A52A2A 100%);
            padding: 15px 30px;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.3);
        }

        nav .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a.logo {
            color: #FFD700;
            text-decoration: none;
            font-size: 1.5em;
            font-weight: bold;
        }

        nav .nav-links a {
            color: #FDF5E6;
            text-decoration: none;
            margin-left: 25px;
            padding: 8px 16px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        nav .nav-links a:hover {
            background: rgba(255, 215, 0, 0.2);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .card {
            background: #FFF;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8B0000 0%, #A52A2A 100%);
            color: #FFD700;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 0, 0, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #DAA520 0%, #B8860B 100%);
            color: #FFF;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(218, 165, 32, 0.3);
        }

        h1, h2, h3 {
            color: #8B0000;
            margin-bottom: 20px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .status-pending {
            background: #FFF3CD;
            color: #856404;
        }

        .status-processing {
            background: #CCE5FF;
            color: #004085;
        }

        .status-completed {
            background: #D4EDDA;
            color: #155724;
        }

        .status-failed {
            background: #F8D7DA;
            color: #721C24;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #8B0000;
            margin-top: 50px;
        }

        footer .dharma-wheel {
            font-size: 2em;
            margin-bottom: 10px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="logo">༄ 藏语学习</a>
            <div class="nav-links">
                <a href="/">首页</a>
                <a href="/input">新建教程</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <div class="dharma-wheel">☸</div>
        <p>藏语学习教程生成器</p>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
