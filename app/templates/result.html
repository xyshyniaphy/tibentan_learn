{% extends "base.html" %}

{% block title %}{{ job.title or "教程" }} - 藏语学习{% endblock %}

{% block content %}
<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>📖 {{ job.title or "藏语教程" }}</h1>
        <div style="display: flex; gap: 10px;">
            <a href="/api/download/{{ job.id }}" class="btn btn-secondary">⬇ 下载 HTML</a>
            <a href="/input" class="btn btn-primary">+ 新建教程</a>
        </div>
    </div>

    <div style="background: #FFF; border-radius: 10px; overflow: hidden; border: 1px solid #DDD;">
        <iframe
            srcdoc="{{ html_content|e }}"
            style="width: 100%; height: 800px; border: none;"
            title="教程预览"
        ></iframe>
    </div>
</div>
{% endblock %}
