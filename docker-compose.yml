services:
  app:
    build: .
    ports:
      - "8340:8000"
    volumes:
      - ./data:/app/data
    environment:
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.z.ai/api/anthropic}
      - IP_WHITELIST=${IP_WHITELIST:-127.0.0.1,::1,172.17.0.1,172.21.0.1}
